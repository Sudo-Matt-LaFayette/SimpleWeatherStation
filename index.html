<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Storm Watch</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Styles -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">

  <!-- ── SIDEBAR ───────────────────────────────── -->
  <aside id="sidebar">

    <div class="logo">
      <div class="logo-mark">⛈</div>
      <div>
        <div class="logo-text">Storm Watch</div>
        <div class="logo-sub">Live Radar</div>
      </div>
    </div>

    <!-- Clock + location -->
    <div id="clock-block">
      <div id="time-display">--:--</div>
      <div id="date-display">Loading...</div>
      <div id="location-display">📍 Johns Creek, GA</div>
    </div>

    <!-- Current conditions -->
    <div class="glass-card" id="temp-card">
      <div class="card-label">Current Conditions</div>
      <div id="temp-icon">🌡️</div>
      <div id="temp-row">
        <span id="temp-value">--</span><span id="temp-unit">°F</span>
      </div>
      <div id="condition-text">Fetching…</div>
      <div id="feels-like">Feels like --°F</div>
    </div>

    <!-- Forecast tiles -->
    <div class="glass-card">
      <div class="card-label">5-Day Forecast</div>
      <div id="forecast-tiles"></div>
    </div>

    <!-- Map layer switcher -->
    <div class="card-label">Map Layer</div>
    <div id="overlay-btns">
      <!-- data-mode="rv"    → RainViewer Leaflet map  -->
      <!-- data-mode="windy" → Windy iframe            -->
      <button class="ov-btn active" data-mode="rv"    data-color="6">Radar</button>
      <button class="ov-btn"        data-mode="rv"    data-color="2">Rain</button>
      <button class="ov-btn"        data-mode="windy" data-overlay="wind"   data-product="ecmwf">Wind</button>
      <button class="ov-btn"        data-mode="windy" data-overlay="temp"   data-product="ecmwf">Temp</button>
      <button class="ov-btn"        data-mode="windy" data-overlay="clouds" data-product="ecmwf">Clouds</button>
    </div>

    <button id="locate-btn">📍 Update Location</button>

  </aside>

  <!-- ── MAP AREA ───────────────────────────────── -->
  <div id="map-wrap">

    <!-- Leaflet map (RainViewer radar) -->
    <div id="leaflet-map" class="visible"></div>

    <!-- Windy iframe (wind / temp / clouds) -->
    <iframe id="windy-frame" src="" allowfullscreen></iframe>

    <!-- Live pill -->
    <div id="live-pill">
      <div class="pulse-dot"></div>
      <span id="pill-text">Radar · RainViewer</span>
    </div>

    <!-- ── Radar Playback Bar ────────────────────── -->
    <div id="radar-bar" class="visible">
      <button id="rb-play" title="Play / Pause">▶</button>

      <div id="rb-scrubber">
        <!-- Frame tick marks (one per fetched frame) -->
        <div id="rb-ticks"></div>
        <!-- Continuous filled progress track -->
        <div id="rb-track">
          <div id="rb-fill"></div>
          <!-- Draggable thumb -->
          <div id="rb-thumb"></div>
        </div>
      </div>

      <div id="rb-meta">
        <span id="rb-time">--:-- --</span>
        <span id="rb-label">PAST</span>
      </div>
    </div>

  </div><!-- /map-wrap -->

</div><!-- /app -->

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- App logic -->
<script src="app.js"></script>
</body>
</html>
